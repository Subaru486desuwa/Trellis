<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="edge" x1="42" y1="53" x2="214" y2="203" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="core" x1="115" y1="115" x2="141" y2="141" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- spokes: agents sharing one persistent core -->
  <g stroke="url(#edge)" stroke-width="3.5" opacity="0.38">
    <line x1="128" y1="128" x2="214" y2="128"/>
    <line x1="128" y1="128" x2="171" y2="54"/>
    <line x1="128" y1="128" x2="85"  y2="54"/>
    <line x1="128" y1="128" x2="42"  y2="128"/>
    <line x1="128" y1="128" x2="85"  y2="202"/>
    <line x1="128" y1="128" x2="171" y2="202"/>
  </g>

  <!-- hexagon frame -->
  <path d="M214 128 L171 54 L85 54 L42 128 L85 202 L171 202 Z"
        stroke="url(#edge)" stroke-width="10" stroke-linejoin="round"/>

  <!-- vertex nodes -->
  <g fill="#3b82f6">
    <circle cx="214" cy="128" r="11"/>
    <circle cx="171" cy="54"  r="11"/>
    <circle cx="85"  cy="54"  r="11"/>
  </g>
  <g fill="#8b5cf6">
    <circle cx="42"  cy="128" r="11"/>
    <circle cx="85"  cy="202" r="11"/>
    <circle cx="171" cy="202" r="11"/>
  </g>

  <!-- shared core -->
  <circle cx="128" cy="128" r="17" fill="url(#core)"/>
  <circle cx="128" cy="128" r="7"  fill="#fff" opacity="0.92"/>
</svg>
